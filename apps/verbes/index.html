<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f4c81">
  <meta name="description" content="تقويم تفاعلي للأفعال الفرنسية مناسب للهاتف والحاسوب والمسلاط.">
  <title>تقويم الأفعال الفرنسية</title>
  <link rel="manifest" href="../../manifest.json">
  <link rel="icon" href="../../assets/icons/icon-192.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./css/style.css">
  <script src="./js/script.js" defer></script>
</head>
<body>
  <div class="verbes-shell">
    <header class="app-header">
      <a class="back-link" href="../../index.html">المنصة</a>

      <div class="title-wrap">
        <span class="app-kicker">فرنسية</span>
        <h1>تقويم الأفعال الفرنسية</h1>
      </div>

      <div class="status-grid">
        <article class="status-card">
          <span>الوقت</span>
          <strong id="timer">10</strong>
        </article>
        <article class="status-card">
          <span>النقاط</span>
          <strong id="score">0</strong>
        </article>
      </div>
    </header>

    <main class="app-main">
      <section class="screen" id="screen" aria-live="polite"></section>
    </main>

    <footer class="app-footer">
      <button class="control-button" id="skipButton" type="button">تخطي</button>
      <button class="control-button secondary" id="answerButton" type="button">إظهار الجواب</button>
      <button class="control-button ghost" id="restartButton" type="button">إعادة</button>
    </footer>
  </div>
</body>
</html>
